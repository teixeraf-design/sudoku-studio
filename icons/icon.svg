<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1f2e"/>
            <stop offset="100%" style="stop-color:#12151c"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
        <filter id="glow">
            <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#c9a253" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Fundo -->
    <rect width="512" height="512" rx="80" fill="url(#bg)" filter="url(#shadow)"/>
    
    <!-- Borda -->
    <rect width="512" height="512" rx="80" fill="none" stroke="#c9a253" stroke-width="4"/>
    
    <!-- Letra S -->
    <text x="256" y="280" font-family="'Fraunces', 'Georgia', serif" 
          font-size="280" font-weight="700" fill="#c9a253" 
          text-anchor="middle" filter="url(#glow)">S</text>
    
    <!-- Texto 9×9 -->
    <text x="256" y="435" font-family="'IBM Plex Mono', monospace" 
          font-size="28" fill="rgba(201,162,83,0.4)" 
          text-anchor="middle" letter-spacing="4">9×9</text>
</svg>